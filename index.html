<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>
  <meta name="theme-color" content="#8b1a1a">
  <title>Мясорубка | Приложение</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f7f5;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 16px;
      background: white;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .logo { font-weight: 900; font-size: 18px; }

    .header-buttons { display: flex; gap: 8px; }
    .btn-icon {
      width: 40px;
      height: 40px;
      border: none;
      background: #f5f5f5;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      position: relative;
    }

    .btn-icon.cart { background: linear-gradient(135deg, #8b1a1a 0%, #a82020 100%); color: white; }
    .btn-icon:active { transform: scale(0.95); }

    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #e8350a;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .hero {
      padding: 20px 16px;
      background: linear-gradient(135deg, #8b1a1a 0%, #a82020 100%);
      color: white;
      border-radius: 0 0 16px 16px;
    }

    .hero h2 { font-size: 24px; margin-bottom: 8px; line-height: 1.2; }
    .hero p { font-size: 14px; opacity: 0.9; }

    .search-box {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e8e8e8;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
    }

    .categories {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: white;
      border-bottom: 1px solid #e8e8e8;
    }

    .categories::-webkit-scrollbar { display: none; }

    .cat-btn {
      padding: 8px 16px;
      background: white;
      border: 1px solid #e8e8e8;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .cat-btn.active {
      background: linear-gradient(135deg, #8b1a1a 0%, #a82020 100%);
      color: white;
      border-color: transparent;
    }

    .cat-btn:active { transform: scale(0.95); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 12px 16px;
      padding-bottom: 100px;
    }

    .product {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: all 0.2s;
    }

    .product:active { transform: scale(0.98); }

    .product-img {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, #f5f0eb 0%, #ebe5df 100%);
      position: relative;
      overflow: hidden;
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .badge-hit {
      position: absolute;
      top: 8px;
      right: 8px;
      background: linear-gradient(135deg, #e8350a 0%, #ff4d2b 100%);
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge-new {
      position: absolute;
      top: 8px;
      right: 8px;
      background: linear-gradient(135deg, #1a7a3a 0%, #2ba054 100%);
      color: white;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
    }

    .product-info {
      padding: 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .product-name { font-weight: 700; font-size: 13px; line-height: 1.3; margin-bottom: 4px; }
    .product-desc { font-size: 11px; color: #999; margin-bottom: 6px; }

    .product-rating {
      font-size: 11px;
      color: #666;
      margin-bottom: 6px;
    }

    .stars { color: #ffc107; }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: auto;
      border-top: 1px solid #e8e8e8;
      padding-top: 8px;
    }

    .price {
      font-size: 14px;
      font-weight: 900;
      color: #8b1a1a;
    }

    .add-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #8b1a1a 0%, #a82020 100%);
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.2s;
    }

    .add-btn:active { transform: scale(0.9); }
    .add-btn.in-cart { background: #fff3f3; color: #8b1a1a; }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e8e8e8;
      display: flex;
      flex-shrink: 0;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.08);
    }

    .nav-btn {
      flex: 1;
      padding: 12px 0;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #999;
      transition: all 0.2s;
    }

    .nav-btn.active {
      color: #8b1a1a;
    }

    .nav-icon { font-size: 20px; }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      align-items: flex-end;
      animation: slideIn 0.3s ease-out;
    }

    .modal.open { display: flex; }

    @keyframes slideIn {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-content {
      width: 100%;
      background: white;
      border-radius: 20px 20px 0 0;
      padding: 20px 16px;
      padding-bottom: 40px;
      max-height: 90vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .modal-header {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
    }

    .cart-item {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .cart-item-img {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      background: white;
      flex-shrink: 0;
      overflow: hidden;
    }

    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-item-info {
      flex: 1;
      min-width: 0;
    }

    .cart-item-name { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
    .cart-item-price { font-size: 12px; color: #999; }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 4px;
      background: white;
      border-radius: 6px;
      border: 1px solid #e8e8e8;
      padding: 2px;
    }

    .qty-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #8b1a1a;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    .qty-val { min-width: 18px; text-align: center; font-size: 12px; font-weight: 600; }

    .summary {
      background: #f5f5f5;
      border-radius: 10px;
      padding: 12px;
      margin: 16px 0;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .summary-row:last-child {
      border-top: 1px solid #e8e8e8;
      padding-top: 6px;
      margin-top: 6px;
      font-size: 15px;
      font-weight: 700;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 8px;
      font-family: inherit;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8b1a1a 0%, #a82020 100%);
      color: white;
    }

    .btn-primary:active { transform: scale(0.98); }

    .btn-secondary {
      background: #f5f5f5;
      color: #1a1a1a;
      border: 1px solid #e8e8e8;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .empty-cart {
      text-align: center;
      padding: 40px 20px;
    }

    .empty-icon { font-size: 40px; margin-bottom: 10px; opacity: 0.6; }
    .empty-text { color: #999; font-size: 14px; }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 16px;
      right: 16px;
      background: #1a1a1a;
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      z-index: 400;
      animation: slideInUp 0.3s ease-out;
    }

    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="logo">🥩 Мясорубка</div>
    <div class="header-buttons">
      <button class="btn-icon cart" onclick="openCart()">
        🛒
        <span class="badge" id="cartBadge" style="display:none;" onclick="event.stopPropagation();">0</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <div class="hero">
    <h2>Свежие деликатесы 🔥</h2>
    <p>Натуральные копчёности с доставкой в Самару</p>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <!-- SEARCH -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Поиск товаров..." onkeyup="searchProducts()">
    </div>

    <!-- CATEGORIES -->
    <div class="categories">
      <button class="cat-btn active" onclick="filterCategory('all')">Все</button>
      <button class="cat-btn" onclick="filterCategory('kopchyonoe')">Копчёное</button>
      <button class="cat-btn" onclick="filterCategory('rulety')">Рулеты</button>
      <button class="cat-btn" onclick="filterCategory('djerki')">Джерки</button>
      <button class="cat-btn" onclick="filterCategory('kolbasy')">Колбасы</button>
    </div>

    <!-- GRID -->
    <div class="grid" id="grid"></div>
  </div>

  <!-- FOOTER NAV -->
  <footer>
    <button class="nav-btn active" onclick="showTab('shop')">
      <span class="nav-icon">🛍️</span>
      Магазин
    </button>
    <button class="nav-btn" onclick="showTab('orders')">
      <span class="nav-icon">📦</span>
      Заказы
    </button>
    <button class="nav-btn" onclick="showTab('profile')">
      <span class="nav-icon">👤</span>
      Профиль
    </button>
  </footer>

  <!-- CART MODAL -->
  <div class="modal" id="cartModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>Ваша корзина</span>
        <button class="close-btn" onclick="closeCart()">✕</button>
      </div>
      <div id="cartItems"></div>
      <div id="cartSummary"></div>
      <button class="btn btn-primary" onclick="checkout()">Оформить заказ</button>
      <button class="btn btn-secondary" onclick="closeCart()">Продолжить покупки</button>
    </div>
  </div>

  <!-- CHECKOUT MODAL -->
  <div class="modal" id="checkoutModal">
    <div class="modal-content">
      <div class="modal-header">
        <span>Оформление</span>
        <button class="close-btn" onclick="closeCheckout()">✕</button>
      </div>
      <form onsubmit="submitOrder(event)">
        <div class="form-group">
          <label>Имя *</label>
          <input type="text" required placeholder="Иван Сидоров">
        </div>
        <div class="form-group">
          <label>Телефон *</label>
          <input type="tel" id="phoneInput" required placeholder="+7 (999) 123-45-67">
        </div>
        <div class="form-group">
          <label>Адрес *</label>
          <input type="text" required placeholder="Ул. Пушкина, дом 10">
        </div>
        <div class="form-group">
          <label>Способ оплаты *</label>
          <select required>
            <option>Наличные при доставке</option>
            <option>Оплатить онлайн</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Подтвердить</button>
      </form>
    </div>
  </div>

    let cart = [];
    let currentFilter = 'all';

    function loadCart() { cart = JSON.parse(localStorage.getItem('cart') || '[]'); }
    function saveCart() { localStorage.setItem('cart', JSON.stringify(cart)); }

    function renderGrid(items = products) {
      const grid = document.getElementById('grid');
      grid.innerHTML = items.map(p => {
        const inCart = cart.find(i => i.id === p.id);
        const stars = '★'.repeat(Math.floor(p.rating)) + '☆'.repeat(5 - Math.floor(p.rating));
        const badge = p.badge ? `<div class="badge-${p.badge}">${p.badge === 'hit' ? '🔥 ХИТ' : '✨ НОВОЕ'}</div>` : '';
        return `
          <div class="product" onclick="addToCart(${p.id})">
            <div class="product-img">
              <img src="${p.img}" alt="${p.name}" loading="lazy">
              ${badge}
            </div>
            <div class="product-info">
              <div class="product-name">${p.name}</div>
              <div class="product-desc">${p.desc}</div>
              <div class="product-rating"><span class="stars">${stars}</span> (${p.reviews})</div>
              <div class="product-footer">
                <div class="price">${p.price}₽</div>
                <button class="add-btn ${inCart ? 'in-cart' : ''}" onclick="event.stopPropagation()">
                  ${inCart ? '✓' : '+'}
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const item = cart.find(i => i.id === id);
      if (item) item.quantity++;
      else cart.push({...product, quantity: 1});
      saveCart();
      updateUI();
      showToast(`${product.name} добавлен`);
    }

    function updateQty(id, delta) {
      const item = cart.find(i => i.id === id);
      if (!item) return;
      item.quantity += delta;
      if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
      saveCart();
      updateUI();
    }

    function updateUI() {
      const total = cart.reduce((s, i) => s + i.quantity, 0);
      const badge = document.getElementById('cartBadge');
      badge.style.display = total > 0 ? 'flex' : 'none';
      badge.textContent = total;
      renderCart();
    }

    function renderCart() {
      const container = document.getElementById('cartItems');
      if (!cart.length) {
        container.innerHTML = '<div class="empty-cart"><div class="empty-icon">🛒</div><p class="empty-text">Корзина пуста</p></div>';
        document.getElementById('cartSummary').innerHTML = '';
        return;
      }
      let total = 0;
      container.innerHTML = cart.map(item => {
        total += item.price * item.quantity;
        return `
          <div class="cart-item">
            <div class="cart-item-img"><img src="${item.img}" alt="${item.name}"></div>
            <div class="cart-item-info">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">${item.price}₽</div>
            </div>
            <div class="qty-control">
              <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
              <span class="qty-val">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
            </div>
          </div>
        `;
      }).join('');
      const del = total >= FREE_FROM ? 0 : DEL_COST;
      document.getElementById('cartSummary').innerHTML = `
        <div class="summary">
          <div class="summary-row"><span>Товары:</span><strong>${total}₽</strong></div>
          <div class="summary-row"><span>Доставка:</span><strong>${del === 0 ? 'Бесплатно 🎉' : del + '₽'}</strong></div>
          <div class="summary-row"><span>Итого:</span><strong>${total + del}₽</strong></div>
        </div>
      `;
    }

    function openCart() { document.getElementById('cartModal').classList.add('open'); renderCart(); }
    function closeCart() { document.getElementById('cartModal').classList.remove('open'); }
    function checkout() {
      const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      if (total < MIN_ORDER) { showToast(`Минимум ${MIN_ORDER}₽`); return; }
      closeCart();
      document.getElementById('checkoutModal').classList.add('open');
    }
    function closeCheckout() { document.getElementById('checkoutModal').classList.remove('open'); }

    function submitOrder(e) {
      e.preventDefault();
      const form = e.target;
      const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
      const del = total >= FREE_FROM ? 0 : DEL_COST;
      const msg = `Заказ от ${form[0].value}\n${form[1].value}\n${form[2].value}\nИтого: ${total + del}₽`;
      window.open(`https://t.me/myasorubka63?text=${encodeURIComponent(msg)}`);
      cart = [];
      saveCart();
      updateUI();
      closeCheckout();
      showToast('Заказ создан! ✅');
    }

    function filterCategory(cat) {
      currentFilter = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      const filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
      renderGrid(filtered);
    }

    function searchProducts() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = products.filter(p => p.name.toLowerCase().includes(query));
      renderGrid(filtered);
    }

    function showTab(tab) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      event.target.closest('.nav-btn').classList.add('active');
      if (tab === 'orders') alert('История заказов появится здесь');
      if (tab === 'profile') alert('Профиль появится здесь');
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    document.getElementById('phoneInput')?.addEventListener('input', (e) => {
      let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
      if (!x[2] && x[1] !== '7') x[1] = '7';
      e.target.value = !x[2] ? '+7' : '+7 (' + x[2] + ') ' + x[3] + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
    });

    loadCart();
    renderGrid();
    updateUI();
  </script>
